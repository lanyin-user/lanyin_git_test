<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yicalw - AI 智能体</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:linear-gradient(90deg, #161b22 0%, #1c2333 100%);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #30363d;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:18px;color:#58a6ff}
.header .actions{display:flex;gap:8px}
.header .btn-icon{background:none;border:1px solid #30363d;color:#8b949e;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px}
.header .btn-icon:hover{background:#21262d;color:#c9d1d9}
.container{display:flex;flex:1;overflow:hidden}
.nav-bar{width:220px;background:linear-gradient(180deg, #161b22 0%, #0d1117 100%);border-right:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.nav-bar .profile-section{padding:20px 16px 16px;text-align:center;border-bottom:1px solid #30363d}
.nav-bar .avatar{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 16px rgba(88,166,255,.25);position:relative}
.nav-bar .avatar .pulse{position:absolute;bottom:2px;right:2px;width:14px;height:14px;border-radius:50%;background:#3fb950;border:2px solid #161b22}
.nav-bar .avatar .pulse.thinking{background:#d29922;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-bar .agent-name{font-size:15px;font-weight:600;color:#c9d1d9;margin-bottom:2px}
.nav-bar .agent-status{font-size:11px;color:#8b949e}
.nav-bar .nav-section{padding:12px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.nav-bar .nav-btn{width:calc(100% - 16px);height:42px;border-radius:8px;border:none;background:transparent;color:#8b949e;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;padding:0 12px;transition:all .2s;white-space:nowrap}
.nav-bar .nav-btn .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-bar .nav-btn .label{flex:1;text-align:left}
.nav-bar .nav-btn:hover{background:#21262d;color:#c9d1d9}
.nav-bar .nav-btn.active{background:#1f6feb;color:#fff}
.nav-bar .nav-bottom{padding:8px;border-top:1px solid #30363d;display:flex;flex-direction:column;gap:2px}
.nav-bar .nav-btn.small{height:36px;font-size:12px}
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-container{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.chat-container .messages{flex:1;overflow-y:auto;padding:16px}
.chat-container .input-area{position:absolute;bottom:0;left:0;right:0}
.messages{flex:1;overflow-y:auto;padding:12px 16px;max-height:calc(100vh - 180px)}
.message{margin-bottom:16px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{text-align:right}
.message .bubble{display:inline-block;max-width:65%;padding:6px 10px;border-radius:10px;font-size:13px;line-height:1.4;word-break:break-word}
.message.user .bubble{background:#1f6feb;color:#fff;border-bottom-right-radius:4px}
.message.assistant .bubble{background:#21262d;border:1px solid #30363d;border-bottom-left-radius:4px}
.message.system .bubble{background:#1a1a2e;color:#8b949e;font-size:12px;max-width:90%}
.message pre{background:#0d1117;padding:10px;border-radius:6px;overflow-x:auto;margin-top:8px;font-size:12px}
.input-area{padding:12px 20px;background:#161b22;border-top:1px solid #30363d;display:flex;gap:8px;box-shadow:0 -2px 8px rgba(0,0,0,.2)}
/* Status indicator above input */
.status-indicator{background:#161b22;padding:8px 20px;border-top:1px solid #30363d;display:none;align-items:center;gap:8px;font-size:12px;color:#8b949e}
.status-indicator.active{display:flex}
.status-indicator .status-dot{width:8px;height:8px;border-radius:50%;background:#d29922;animation:pulse 1s infinite}
.status-indicator .status-text{flex:1}
.status-indicator .status-type{background:#21262d;padding:2px 8px;border-radius:10px;font-size:10px}
.status-details{line-height:1.3}
.input-area textarea{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px;color:#c9d1d9;font-size:14px;resize:none;outline:none;font-family:inherit;min-height:44px;max-height:120px}
.input-area textarea:focus{border-color:#58a6ff}
.input-area button{background:#238636;color:#fff;border:none;border-radius:8px;padding:0 20px;cursor:pointer;font-size:14px;transition:background .2s}
.input-area button:hover{background:#2ea043}
.input-area button:disabled{background:#30363d;cursor:not-allowed}
.typing{color:#8b949e;font-size:12px;font-style:italic;padding:4px 0}
.sidebar{width:280px;background:#161b22;border-left:1px solid #30363d;overflow-y:auto;padding:16px;flex-shrink:0;transition:width .3s ease, opacity .3s ease, margin .3s ease}
.sidebar.collapsed{width:0;padding:0;overflow:hidden;border:none;opacity:0;margin-left:-280px}
.sidebar h3{font-size:13px;color:#8b949e;text-transform:uppercase;margin-bottom:12px}
.sidebar .section{margin-bottom:20px}
.sidebar .item{font-size:13px;padding:6px 10px;background:#0d1117;border-radius:6px;margin-bottom:6px;cursor:pointer;transition:background .2s}
.sidebar .item:hover{background:#21262d}
.sidebar .task-item{font-size:12px;padding:8px;background:#0d1117;border-radius:6px;margin-bottom:6px;border-left:3px solid #58a6ff}
.sidebar .task-item.done{border-left-color:#3fb950}
.sidebar .task-item.running{border-left-color:#d29922}
.sidebar .task-item.error{border-left-color:#f85149}
.sidebar .task-id{color:#8b949e;font-size:10px}
.sidebar .btn-sm{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px;margin-top:4px}
.sidebar .btn-sm:hover{background:#30363d}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
@media(max-width:768px){.sidebar{display:none !important}
.nav-bar{display:none}}
.nav-bar::-webkit-scrollbar{display:none}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
.settings-panel{background:linear-gradient(135deg, #161b22 0%, #1c2333 100%);border:1px solid #30363d;border-radius:12px;padding:24px;width:420px;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.settings-panel h2{font-size:18px;color:#58a6ff;margin-bottom:16px}
.settings-panel label{display:block;font-size:13px;color:#8b949e;margin-bottom:4px;margin-top:12px}
.settings-panel input,.settings-panel select{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:14px;outline:none}
.settings-panel input:focus,.settings-panel select:focus{border-color:#58a6ff}
.settings-panel .save-btn{margin-top:20px;width:100%;background:#238636;color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:14px}
.settings-panel .save-btn:hover{background:#2ea043}
.settings-panel .saved-msg{color:#3fb950;font-size:12px;margin-top:8px;text-align:center}
.welcome-msg{text-align:center;padding:60px 20px;color:#8b949e;background:linear-gradient(135deg, #161b22 0%, #0d1117 100%);border-radius:12px;margin:20px}
.welcome-msg h2{font-size:20px;color:#58a6ff;margin-bottom:8px}
.welcome-msg p{font-size:12px;margin-bottom:4px}
/* Skills Panel */
.view-panel{display:none;flex-direction:column;height:100%;padding:16px;overflow:hidden}
.view-panel.active{display:flex}
/* Chat view special handling */
#chatView{display:flex;flex-direction:column;flex:1;overflow:hidden}
#chatView.hidden{display:none !important}
.skills-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #30363d}
.skills-panel-header h2{font-size:16px;color:#58a6ff}
.btn-generate{background:#1f6feb;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;transition:background .2s}
.btn-generate:hover{background:#388bfd}
.btn-generate:disabled{background:#30363d;cursor:not-allowed}
.skills-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.skill-card{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;cursor:pointer;transition:all .2s}
.skill-card:hover{border-color:#58a6ff;background:#161b22}
.skill-card .skill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.skill-card .skill-name{font-size:14px;font-weight:600;color:#c9d1d9}
.skill-card .skill-desc{font-size:12px;color:#8b949e;margin-bottom:8px;line-height:1.4}
.skill-card .skill-meta{display:flex;gap:8px;align-items:center}
.skill-card .skill-tag{font-size:10px;background:#21262d;color:#8b949e;padding:2px 8px;border-radius:10px}
.skill-card .skill-actions{display:flex;gap:4px}
.skill-card .skill-actions button{background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:10px;transition:all .2s}
.skill-card .skill-actions button:hover{background:#30363d;color:#c9d1d9}
.skill-card .skill-actions button.delete:hover{background:#da3633;border-color:#da3633;color:#fff}
.skill-empty{text-align:center;padding:40px 20px;color:#8b949e}
.skill-empty .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.skill-empty p{font-size:13px}
.skill-detail-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.skill-detail-overlay.active{display:flex}
.skill-detail-panel{background:linear-gradient(135deg, #161b22 0%, #1c2333 100%);border:1px solid #30363d;border-radius:12px;padding:24px;width:600px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.skill-detail-panel h3{font-size:16px;color:#58a6ff;margin-bottom:12px}
.skill-detail-panel .detail-body{font-size:13px;color:#c9d1d9;line-height:1.6;white-space:pre-wrap;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:16px;max-height:400px;overflow-y:auto;margin-bottom:16px}
.skill-detail-panel .detail-footer{display:flex;gap:8px;justify-content:flex-end}
.skill-detail-panel .detail-footer button{border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:12px;transition:all .2s}
.generate-form{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
.generate-form label{display:block;font-size:12px;color:#8b949e;margin-bottom:6px}
.generate-form textarea{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px;color:#c9d1d9;font-size:13px;resize:vertical;outline:none;font-family:inherit;min-height:80px}
.generate-form textarea:focus{border-color:#58a6ff}
.generate-form .gen-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Yicalw</h1>
  <div class="actions">
    <button class="btn-icon" onclick="toggleSidebar()" title="切换侧栏">☰ 面板</button>
  </div>
</div>

<div class="container">
  <div class="nav-bar">
    <div class="profile-section">
      <div class="avatar" id="avatar" style="background:linear-gradient(135deg,#1f6feb,#58a6ff);">
        <span style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))">⚡</span>
        <div class="pulse" id="statusDot"></div>
      </div>
      <div class="agent-name">小奕</div>
      <div class="agent-status" id="agentStatus">在线 · 随时待命</div>
    </div>
    <div class="nav-section">
      <button class="nav-btn active" onclick="switchView('chat', this)"><span class="icon">💬</span><span class="label">聊天</span></button>
      <button class="nav-btn" onclick="switchView('knowledge', this)"><span class="icon">📚</span><span class="label">知识库</span></button>
      <button class="nav-btn" onclick="switchView('video', this)"><span class="icon">🎬</span><span class="label">视频</span></button>
      <button class="nav-btn" onclick="switchView('tools', this)"><span class="icon">🔧</span><span class="label">工具</span></button>
      <button class="nav-btn" onclick="switchView('tasks', this)"><span class="icon">📋</span><span class="label">任务</span></button>
      <button class="nav-btn" onclick="switchView('skills', this)"><span class="icon">🛠️</span><span class="label">技能</span></button>
    </div>
    <div class="nav-bottom">
      <button class="nav-btn small" onclick="toggleSettings()"><span class="icon">⚙️</span><span class="label">设置</span></button>
      <button class="nav-btn small" onclick="clearChat()"><span class="icon">🗑️</span><span class="label">清空对话</span></button>
    </div>
  </div>
  <div class="chat-panel">
    <!-- 聊天视图 -->
    <div id="view-chat" class="view-panel active">
      <div class="messages" id="messages">
        <div class="welcome-msg" id="welcomeMsg">
          <h2>欢迎使用 Yicalw</h2>
          <p>AI 智能体 · 你的本地助手</p>
          <p style="margin-top:16px;font-size:12px">点击左侧底部 ⚙️ 配置 API 后即可开始对话</p>
        </div>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <div class="status-dot"></div>
        <div style="flex:1;min-width:0">
          <span class="status-text" id="statusText">小奕正在思考...</span>
          <div class="status-details" id="statusDetails" style="font-size:11px;color:#8b949e;margin-top:4px;max-height:40px;overflow-y:auto">正在分析你的问题</div>
        </div>
        <span class="status-type" id="statusType">思考中</span>
      </div>
      <div class="input-area">
        <textarea id="input" placeholder="输入消息..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button onclick="sendMessage()" id="sendBtn">发送</button>
        <button onclick="stopGeneration()" id="stopBtn" style="display:none;background:#da3633;color:#fff;border:none;border-radius:8px;padding:0 16px;cursor:pointer;font-size:14px">停止</button>
      </div>
    </div>
    <!-- 知识库视图 -->
    <div id="view-knowledge" class="view-panel">
      <div class="skills-panel-header">
        <h2>📚 知识库</h2>
      </div>
      <div class="skill-empty">
        <div class="icon">📚</div>
        <p>知识库功能开发中...</p>
      </div>
    </div>
    <!-- 视频生成视图 -->
    <div id="view-video" class="view-panel" style="display:none">
      <div class="chat-container" id="videoChatContainer">
        <div class="messages" id="videoMessages">
          <div class="welcome-msg">
            <h2>🎬 视频生成</h2>
            <p style="font-size:13px;color:#8b949e;margin-top:8px">输入视频描述，生成后将返回视频URL。<br>视频API模型请在设置中单独配置。</p>
          </div>
        </div>
        <div class="input-area">
          <textarea id="videoInput" placeholder="描述你想要的视频，例如：夕阳下的海边，波浪轻轻拍打沙滩..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendVideoMessage()}"></textarea>
          <button onclick="sendVideoMessage()" id="videoSendBtn">生成视频</button>
        </div>
      </div>
    </div>
    <!-- 工具视图 -->
    <div id="view-tools" class="view-panel">
      <div class="skills-panel-header">
        <h2>🔧 工具</h2>
      </div>
      <div class="skill-empty">
        <div class="icon">🔧</div>
        <p>工具面板功能开发中...</p>
      </div>
    </div>
    <!-- 任务视图 -->
    <div id="view-tasks" class="view-panel">
      <div class="skills-panel-header">
        <h2>📋 任务管理</h2>
      </div>
      <div style="flex:1;overflow-y:auto;padding:8px" id="taskListMain">
        <div class="skill-empty"><p>加载中...</p></div>
      </div>
    </div>
    <!-- 技能管理视图 -->
    <div id="view-skills" class="view-panel">
      <div class="skills-panel-header">
        <h2>🛠️ 技能管理</h2>
        <button class="btn-generate" onclick="showGenerateForm()">✨ 生成新技能</button>
      </div>
      <div id="generateFormArea"></div>
      <div class="skills-list" id="skillsList">加载中...</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="section">
      <h3>📋 定时任务</h3>
      <div id="taskList"><div class="item" style="color:#8b949e;text-align:center;">加载中...</div></div>
    </div>
    <div class="section">
      <h3>📊 状态</h3>
      <div id="statusInfo" style="font-size:12px;color:#8b949e;"></div>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay" style="display:none">
  <div class="settings-panel">
    <h2>⚙️ 配置 API</h2>
    <label>API 地址</label>
    <input type="text" id="cfgApiUrl" placeholder="https://api.openai.com/v1">
    <label>API Key</label>
    <input type="password" id="cfgApiKey" placeholder="sk-...">
    <label>模型名称</label>
    <input type="text" id="cfgModel" placeholder="qwen-plus">
    <button class="save-btn" onclick="saveSettings()">保存配置</button>
    <button class="save-btn" style="background:#da3633;margin-top:8px" onclick="testApi()">测试 API</button>
    <button class="save-btn" style="background:#30363d;margin-top:8px" onclick="cancelSettings()">取消</button>
    <div class="saved-msg" id="savedMsg"></div>
  </div>
</div>

<!-- Skill Detail Modal -->
<div class="skill-detail-overlay" id="skillDetailOverlay" onclick="if(event.target===this)closeSkillDetail()">
  <div class="skill-detail-panel">
    <h3 id="skillDetailTitle">技能详情</h3>
    <div class="detail-body" id="skillDetailBody"></div>
    <div class="detail-footer">
      <button style="background:#30363d;color:#c9d1d9" onclick="closeSkillDetail()">关闭</button>
      <button style="background:#da3633;color:#fff" onclick="deleteSkillFromDetail()">删除技能</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const messagesDiv = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const welcomeMsg = document.getElementById('welcomeMsg');
const sidebar = document.querySelector('.sidebar');
let settingsLoaded = false;
let sidebarOpen = true;
let currentSkillId = null;
let currentView = 'chat'; // 'chat' or 'skills'
let isGenerating = false;
let abortController = null;

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

function escapeHtml(text) {
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return String(text).replace(/[&<>"']/g, m => map[m]);
}

function addMessage(role, content, isHtml=false) {
  if(welcomeMsg) welcomeMsg.remove();
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if(role==='assistant' && isHtml) div.innerHTML = `<div class="bubble">${content}</div>`;
  else div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addSystemMessage(text) { addMessage('system', text); }

function showTyping(status = 'thinking', details = '') {
  // Update nav bar status
  const dot = document.getElementById('statusDot');
  if(dot) { dot.classList.add('thinking'); dot.style.background = '#d29922'; }
  const statusText = document.getElementById('agentStatus');
  if(statusText) statusText.textContent = status === 'executing' ? '执行中...' : '思考中...';
  
  // Update status indicator above input
  const indicator = document.getElementById('statusIndicator');
  const statusTextEl = document.getElementById('statusText');
  const statusTypeEl = document.getElementById('statusType');
  const statusDetailsEl = document.getElementById('statusDetails');
  if(indicator && statusTextEl && statusTypeEl) {
    indicator.classList.add('active');
    statusTextEl.textContent = status === 'executing' ? '小奕正在执行任务...' : '小奕正在思考...';
    statusTypeEl.textContent = status === 'executing' ? '执行中' : '思考中';
    if(statusDetailsEl && details) {
      statusDetailsEl.textContent = details;
      statusDetailsEl.style.display = 'block';
    }
  }
  
  // Show stop button
  const stopBtn = document.getElementById('stopBtn');
  if(stopBtn) stopBtn.style.display = 'block';
  
  // Also show old typing indicator for backward compatibility
  const div = document.createElement('div');
  div.id = 'typingIndicator';
  div.className = 'typing';
  div.textContent = status === 'executing' ? '🔧 执行任务中...' : '⚡ 思考中...';
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if(el) el.remove();
  
  // Update nav bar status
  const dot = document.getElementById('statusDot');
  if(dot) { dot.classList.remove('thinking'); dot.style.background = '#3fb950'; }
  const statusText = document.getElementById('agentStatus');
  if(statusText) statusText.textContent = '在线 · 随时待命';
  
  // Hide status indicator
  const indicator = document.getElementById('statusIndicator');
  if(indicator) indicator.classList.remove('active');
  
  // Hide stop button
  const stopBtn = document.getElementById('stopBtn');
  if(stopBtn) stopBtn.style.display = 'none';
  
  isGenerating = false;
}

async function sendMessage() {
  if(isGenerating) return; // Prevent multiple simultaneous requests
  
  const text = inputEl.value.trim();
  if(!text) return;
  
  addMessage('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  isGenerating = true;
  
  // Create abort controller for this request
  abortController = new AbortController();
  
  showTyping('thinking');
  
  try {
    const resp = await fetch('/api/message', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text}),
      signal: abortController.signal
    });
    const data = await resp.json();
    hideTyping();
    addMessage('assistant', data.result, true);
  } catch(e) {
    if(e.name === 'AbortError') {
      addMessage('system', '⏹️ 已停止生成');
    } else {
      hideTyping();
      addMessage('assistant', `❌ 请求失败: ${e.message}`, true);
    }
  }
  sendBtn.disabled = false;
  isGenerating = false;
  abortController = null;
}

function stopGeneration() {
  if(abortController) {
    abortController.abort();
  }
}

function toggleSettings() {
  const overlay = document.getElementById('settingsOverlay');
  if(overlay.style.display==='none' || !overlay.style.display) {
    overlay.style.display='flex';
    if(!settingsLoaded) { loadSettings(); settingsLoaded = true; }
  } else { overlay.style.display='none'; }
}

async function loadSettings() {
  try {
    const resp = await fetch('/api/settings');
    const cfg = await resp.json();
    document.getElementById('cfgApiUrl').value = cfg.apiUrl||'';
    document.getElementById('cfgApiKey').value = cfg.apiKey||'';
    document.getElementById('cfgModel').value = cfg.model||'';
  } catch(e) {
    document.getElementById('cfgApiKey').value = localStorage.getItem('yicalw_apiKey')||'';
    document.getElementById('cfgApiUrl').value = localStorage.getItem('yicalw_apiUrl')||'';
    document.getElementById('cfgModel').value = localStorage.getItem('yicalw_model')||'';
  }
}

async function saveSettings() {
  const apiUrl = document.getElementById('cfgApiUrl').value.trim();
  const apiKey = document.getElementById('cfgApiKey').value.trim();
  const model = document.getElementById('cfgModel').value.trim();
  try {
    await fetch('/api/settings', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({apiUrl, apiKey, model})
    });
  } catch(e) {
    localStorage.setItem('yicalw_apiKey', apiKey);
    localStorage.setItem('yicalw_apiUrl', apiUrl);
    localStorage.setItem('yicalw_model', model);
  }
  const msg = document.getElementById('savedMsg');
  msg.textContent = '✅ 配置已保存！关闭弹窗即可使用';
  setTimeout(()=>{ msg.textContent=''; document.getElementById('settingsOverlay').style.display='none'; }, 1500);
}

function cancelSettings() {
  document.getElementById('settingsOverlay').style.display='none';
}

function switchView(viewName, btn) {
  // Update nav buttons
  document.querySelectorAll('.nav-bar .nav-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  
  // Hide all panels
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  
  // Show selected panel
  const targetPanel = document.getElementById('view-' + viewName);
  if(targetPanel) {
    targetPanel.classList.add('active');
  }
  
  // Load data for specific views
  if(viewName === 'skills') {
    loadSkills();
  } else if(viewName === 'tasks') {
    loadMainTasks();
  }
  
  currentView = viewName;
}

async function testApi() {
  const apiKey = document.getElementById('cfgApiKey').value.trim();
  const apiUrl = document.getElementById('cfgApiUrl').value.trim();
  const msg = document.getElementById('savedMsg');
  
  if(!apiKey) { msg.textContent='❌ 请先填写 API Key'; return; }
  
  msg.textContent = '⏳ 正在测试 API 连接...';
  
  try {
    const baseUrl = apiUrl || 'https://api.openai.com/v1';
    const resp = await fetch(baseUrl + '/models', {
      method: 'GET',
      headers: { 
        'Authorization': 'Bearer ' + apiKey,
        'Content-Type': 'application/json'
      }
    });
    
    if(resp.ok) {
      const data = await resp.json();
      if(data.data && data.data.length > 0) {
        msg.textContent = '✅ API 可用！找到 ' + data.data.length + ' 个模型';
      } else {
        msg.textContent = '⚠️ API 连接成功，但未找到模型';
      }
    } else {
      const errorData = await resp.json().catch(() => ({}));
      msg.textContent = '❌ API 测试失败: ' + resp.status + ' ' + (errorData.error?.message || resp.statusText);
    }
  } catch(e) {
    msg.textContent = '❌ 网络错误: ' + e.message;
  }
}

// ===== 视频生成功能 =====

// ===== 前端本地视频生成（Canvas + MediaRecorder）=====
let canvas, ctx, mediaRecorder, recordedChunks = [];
let animationId = null;
let currentBlob = null;

function initCanvas() {
  canvas = document.getElementById('videoCanvas');
  ctx = canvas.getContext('2d');
  canvas.width = 640;
  canvas.height = 360;
}

// 根据提示词生成颜色主题
function getThemeFromPrompt(prompt) {
  const lower = prompt.toLowerCase();
  if (lower.includes('海') || lower.includes('洋') || lower.includes('波') || lower.includes('蓝')) {
    return { bg1: '#001a33', bg2: '#003366', accent: '#00aaff', particles: ['#00ddff', '#0088cc', '#0066aa'] };
  }
  if (lower.includes('日') || lower.includes('夕') || lower.includes('阳') || lower.includes('橙') || lower.includes('红')) {
    return { bg1: '#1a0a00', bg2: '#663300', accent: '#ff6600', particles: ['#ffaa00', '#ff4400', '#cc3300'] };
  }
  if (lower.includes('夜') || lower.includes('星') || lower.includes('月') || lower.includes('黑')) {
    return { bg1: '#000011', bg2: '#000033', accent: '#6666ff', particles: ['#8888ff', '#aaaaFF', '#ffffff'] };
  }
  if (lower.includes('森') || lower.includes('林') || lower.includes('绿') || lower.includes('草')) {
    return { bg1: '#001a00', bg2: '#003300', accent: '#00cc44', particles: ['#22ff55', '#00aa33', '#44dd66'] };
  }
  if (lower.includes('雪') || lower.includes('冰') || lower.includes('白') || lower.includes('冬')) {
    return { bg1: '#111122', bg2: '#334466', accent: '#aaccff', particles: ['#ffffff', '#ddeeff', '#bbddff'] };
  }
  if (lower.includes('花') || lower.includes('粉') || lower.includes('春')) {
    return { bg1: '#1a0011', bg2: '#330022', accent: '#ff66aa', particles: ['#ff88cc', '#ff4488', '#ffaadd'] };
  }
  // 默认渐变
  return { bg1: '#0a0a1a', bg2: '#1a1a3a', accent: '#58a6ff', particles: ['#58a6ff', '#3fb950', '#f0883e'] };
}

// 粒子类
class Particle {
  constructor(canvas, theme, style) {
    this.reset(canvas, theme, style);
  }
  reset(canvas, theme, style) {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 4 + 1;
    this.speedX = (Math.random() - 0.5) * 2;
    this.speedY = (Math.random() - 0.5) * 2;
    this.opacity = Math.random() * 0.8 + 0.2;
    this.color = theme.particles[Math.floor(Math.random() * theme.particles.length)];
    this.life = Math.random() * 100 + 50;
    this.maxLife = this.life;
    this.style = style;
  }
  update(canvas) {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;
    this.opacity = (this.life / this.maxLife) * 0.8 + 0.2;
    if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.reset(canvas, { particles: this.color ? [this.color] : ['#58a6ff'] }, this.style);
    }
  }
  draw(ctx) {
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = this.color;
    if (this.style === 'circle') {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.style === 'rect') {
      ctx.fillRect(this.x, this.y, this.size * 2, this.size * 2);
    } else {
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - this.size);
      ctx.lineTo(this.x + this.size, this.y + this.size);
      ctx.lineTo(this.x - this.size, this.y + this.size);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// 波浪类
class Wave {
  constructor(canvas, theme) {
    this.canvas = canvas;
    this.theme = theme;
    this.offset = 0;
    this.amplitude = 20;
    this.frequency = 0.02;
  }
  update() {
    this.offset += 0.03;
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.moveTo(0, this.canvas.height);
    for (let x = 0; x <= this.canvas.width; x += 5) {
      const y = this.canvas.height * 0.6 + Math.sin(x * this.frequency + this.offset) * this.amplitude;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(this.canvas.width, this.canvas.height);
    ctx.closePath();
    ctx.fillStyle = this.theme.accent + '40';
    ctx.fill();
  }
}

// 几何图形动画
function drawGeometric(ctx, canvas, time, theme) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    const radius = 30 + i * 25 + Math.sin(time * 0.001 + i) * 10;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// 主渲染循环
function renderFrame(timestamp, particles, waves, style, theme) {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, theme.bg1);
  gradient.addColorStop(1, theme.bg2);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 绘制几何背景
  if (style === 'geometric') {
    drawGeometric(ctx, canvas, timestamp, theme);
  }

  // 绘制波浪
  waves.forEach(wave => {
    wave.update();
    wave.draw(ctx);
  });

  // 绘制粒子
  particles.forEach(p => {
    p.update(canvas);
    p.draw(ctx);
  });

  // 文字提示
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Yicalw 本地视频生成', canvas.width / 2, canvas.height - 20);
  ctx.globalAlpha = 1;
}

// 开始生成
async function startVideoGenerate() {
  const prompt = document.getElementById('videoPrompt').value.trim();
  const duration = parseInt(document.getElementById('videoDuration').value);
  const style = document.getElementById('videoStyle').value;
  
  if (!prompt) {
    alert('请输入视频描述');
    return;
  }
  
  const btn = document.getElementById('videoGenBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  
  document.getElementById('videoPreviewArea').style.display = 'block';
  document.getElementById('videoResultArea').style.display = 'none';
  
  const theme = getThemeFromPrompt(prompt);
  initCanvas();
  
  // 创建粒子和波浪
  const particles = [];
  for (let i = 0; i < 50; i++) {
    particles.push(new Particle(canvas, theme, style));
  }
  const waves = [new Wave(canvas, theme)];
  
  // 设置MediaRecorder
  const stream = canvas.captureStream(30); // 30fps
  recordedChunks = [];
  
  let mimeType = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm';
  }
  
  const recorder = new MediaRecorder(stream, {
    mimeType: mimeType,
    videoBitsPerSecond: 2500000
  });
  
  recorder.ondataavailable = (e) => {
    if (e.data.size > 0) {
      recordedChunks.push(e.data);
    }
  };
  
  recorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: mimeType });
    currentBlob = blob;
    const url = URL.createObjectURL(blob);
    
    const videoEl = document.getElementById('resultVideo');
    videoEl.src = url;
    
    document.getElementById('videoPreviewArea').style.display = 'none';
    document.getElementById('videoResultArea').style.display = 'block';
    
    btn.disabled = false;
    btn.textContent = '🎬 开始生成';
    
    cancelAnimationFrame(animationId);
  };
  
  recorder.start();
  
  // 动画循环
  let startTime = performance.now();
  const endTime = startTime + duration * 1000;
  
  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min((elapsed / (endTime - startTime)) * 100, 100);
    
    document.getElementById('videoProgressBar').style.width = progress + '%';
    document.getElementById('videoProgressText').textContent = Math.round(progress) + '%';
    document.getElementById('videoStatusText').textContent = '正在渲染帧... (' + Math.round(progress) + '%)';
    
    renderFrame(now, particles, waves, style, theme);
    
    if (now < endTime) {
      animationId = requestAnimationFrame(animate);
    } else {
      recorder.stop();
    }
  }
  
  animationId = requestAnimationFrame(animate);
}

// 下载视频
function downloadVideo() {
  if (!currentBlob) return;
  const url = URL.createObjectURL(currentBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'yicalw_video_' + Date.now() + '.webm';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function sendVideoMessage() {
  const input = document.getElementById('videoInput');
  const message = input.value.trim();
  if (!message) return;
  
  // 添加用户消息
  addVideoMessage('user', message);
  input.value = '';
  input.style.height = 'auto';
  
  // 显示思考状态
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message assistant-message typing';
  typingDiv.innerHTML = '⚡ 思考中...';
  document.getElementById('videoMessages').appendChild(typingDiv);
  scrollVideoMessages();
  
  try {
    // 发送到后端
    const resp = await fetch('/api/video-generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message })
    });
    const data = await resp.json();
    
    // 移除思考状态
    typingDiv.remove();
    
    // 添加助手回复
    addVideoMessage('assistant', data.result || '视频生成请求已处理');
  } catch(e) {
    typingDiv.remove();
    addVideoMessage('assistant', '❌ 请求失败: ' + e.message);
  }
}

function addVideoMessage(type, text) {
  const messagesDiv = document.getElementById('videoMessages');
  const msgDiv = document.createElement('div');
  msgDiv.className = type === 'user' ? 'message user-message' : 'message assistant-message';
  msgDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
  messagesDiv.appendChild(msgDiv);
  scrollVideoMessages();
}

function scrollVideoMessages() {
  const container = document.getElementById('videoChatContainer');
  if(container) container.scrollTop = container.scrollHeight;
}

loadTasks();
setInterval(loadTasks, 10000);
</script>
</body>
